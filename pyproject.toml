[project]
name = "asktherepo-workspace"
version = "0.1.0"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["libs/*", "services/*"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
# migrations/ is Alembic-autogenerated boilerplate, not hand-typed code.
# tests/ across services intentionally share basenames (test_health.py in
# every service) for readability - fine for pytest, but it collides under
# mypy's default per-basename module resolution, so tests are excluded from
# static analysis here and rely on actually running (see CI).
exclude = ["migrations/", "tests/"]

[tool.pytest.ini_options]
testpaths = ["libs", "services", "eval"]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
